# IdentityHub — full stack for local/demo use: `docker compose up --build`.
#
# Steady state is three services. The bonus `digest` job is defined under a
# profile so it does NOT start by default; run it on demand with:
#   docker compose run --rm digest
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: identityhub
      POSTGRES_PASSWORD: identityhub
      POSTGRES_DB: identityhub
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identityhub"]
      interval: 5s
      timeout: 3s
      retries: 10

  # HashiCorp Vault (dev mode) — Transit engine encrypts Jira tokens; the key
  # never leaves Vault. NOTE: dev mode is in-memory and auto-unsealed, so a
  # restart loses the key (and makes stored tokens undecryptable). Production
  # would run Vault with persistent storage and a real unseal/auth flow.
  vault:
    image: hashicorp/vault:1.18
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    command: server -dev
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://identityhub:identityhub@db:5432/identityhub
      # Vault Transit is the default credential-encryption backend.
      CRYPTO_BACKEND: ${CRYPTO_BACKEND:-vault}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      # Only used if CRYPTO_BACKEND=local. Intentionally weak dev default.
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-dev-only-insecure-key-change-me-please}
      FRONTEND_ORIGIN: http://localhost:5173
      SECURE_COOKIES: "false"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # OIDC / hosted IdP (e.g. Auth0). Leave unset to use password login.
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:8000/auth/oidc/callback}
      OIDC_POST_LOGIN_REDIRECT: ${OIDC_POST_LOGIN_REDIRECT:-http://localhost:5173/}
      OIDC_STATE_SECRET: ${OIDC_STATE_SECRET:-dev-only-oidc-state-secret-change-me}
      # Optional NHI context → Jira custom-field mapping (JSON). Empty = use the
      # description template.
      NHI_FIELD_MAP: ${NHI_FIELD_MAP:-}
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

  # Bonus: NHI Blog Digest. One-shot job, not a long-running service.
  # Started only via `docker compose run --rm digest` (profile keeps it out of
  # the default `up`).
  digest:
    build: ./backend
    profiles: ["digest"]
    depends_on:
      db:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://identityhub:identityhub@db:5432/identityhub
      CRYPTO_BACKEND: ${CRYPTO_BACKEND:-vault}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-dev-only-insecure-key-change-me-please}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DIGEST_USER_EMAIL: ${DIGEST_USER_EMAIL:-}
      DIGEST_PROJECT_KEY: ${DIGEST_PROJECT_KEY:-}
    command: ["python", "-m", "app.digest.run"]

volumes:
  pgdata:
